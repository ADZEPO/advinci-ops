<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdVinci · OPS System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f9fafb; }
    select, input, button { font-family: 'DM Sans', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── CONFIG ──────────────────────────────────────────────────────────────
    // Replace these two values after setup. Leave empty to use manual-only mode.
    const SHEET_ID = "17xtzbI3lXoJuTftg_r7VRysCcwfvHMsjxYUwP0iZe5A";        // e.g. "1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms"
    const SHEET_NAME = "campaigns"; // must match the tab name in your Google Sheet

    // ─── PIPELINE DATA ───────────────────────────────────────────────────────
    const pipelines = [
      {
        id: "domain", code: "01", label: "Domain Setup", color: "#F5761A", icon: "🌐",
        objective: "Create deliverability-optimized domains and inboxes ready for cold email campaigns.",
        steps: [
          { id: 1, title: "Domain Acquisition", detail: "Buy secondary domains (not client's main domain). Keep names natural and similar.", rules: ["Avoid spammy names", "Avoid too many hyphens", "1 domain = 2–3 inboxes"], checklist: ["Domains purchased", "Names are readable & professional"] },
          { id: 2, title: "DNS Configuration", detail: "Set up SPF, DKIM, and DMARC records for each domain.", rules: ["SPF: v=spf1 include:_spf.google.com ~all", "DMARC: p=none + rua email"], checklist: ["SPF added", "DKIM verified", "DMARC configured"] },
          { id: 3, title: "Inbox Creation", detail: "Create 2–3 inboxes per domain using real first names (not info@ or sales@).", rules: ["Use realistic names e.g. john@, emma@", "Store credentials securely"], checklist: ["Inboxes created", "Credentials stored"] },
          { id: 4, title: "Inbox Configuration", detail: "Set up profile picture, realistic name, and email signature per inbox.", rules: ["Match timezone with target audience", "Signature must look human"], checklist: ["Profile picture set", "Signature configured", "Timezone matched"] },
          { id: 5, title: "Domain Health Check", detail: "Verify DNS propagation, blacklist status, and deliverability readiness.", rules: ["Check for SPF/DKIM errors", "Confirm not blacklisted"], checklist: ["DNS propagated", "Not blacklisted", "Ready for warmup"] },
        ],
        mistakes: ["Using main domain", "Too many inboxes per domain", "Skipping DNS setup", "Fake inbox names", "Sending too early"],
        nextStep: "warmup",
      },
      {
        id: "warmup", code: "02", label: "Warmup Phase", color: "#FFB74D", icon: "🔥",
        objective: "Gradually build sender reputation for new domains and inboxes to ensure high deliverability.",
        tools: ["Zapmail — initial warmup & health checks", "Lemwarm — ongoing interaction-based warmup"],
        steps: [
          { id: 1, title: "Initial Warmup (Zapmail)", detail: "Activate warmup immediately after inbox creation. Monitor spam placement.", rules: ["Never skip this step", "Ensure DNS fully working first"], checklist: ["Warmup activated", "No DNS errors", "Not landing in spam"] },
          { id: 2, title: "Progressive Volume Ramp", detail: "Increase sending volume gradually over 2–3 weeks.", rules: ["Day 1–3: 5–10/day", "Day 4–7: 10–20/day", "Week 2+: 20–40/day", "Never spike volume suddenly"], checklist: ["Volume schedule defined", "No sudden spikes"] },
          { id: 3, title: "Lemwarm Integration", detail: "Connect inboxes to Lemwarm to simulate real interactions.", rules: ["Must be active throughout warmup", "Confirm replies are happening"], checklist: ["Lemwarm active", "Replies happening", "Emails auto-removed from spam"] },
          { id: 4, title: "Manual Activity Simulation", detail: "Perform light manual actions to mimic human behavior.", rules: ["Send real emails between inboxes", "Reply manually", "Open emails"], checklist: ["Manual sends done", "Replies sent"] },
          { id: 5, title: "Monitoring & Health Checks", detail: "Monitor spam rate, open rate, and reply activity daily.", rules: ["Red flag: emails in spam", "Red flag: no replies", "Red flag: sudden drops"], checklist: ["Daily monitoring active", "No spam flags", "Performance stable"] },
          { id: 6, title: "Warmup Completion", detail: "Inboxes are ready when placement is stable, volume consistent, and no spam flags.", rules: ["Typical duration: 2–3 weeks", "Do NOT rush this step"], checklist: ["Consistent inbox placement", "Stable volume", "No spam flags", "Ready for campaigns"] },
        ],
        mistakes: ["Sending too early", "Increasing volume too fast", "Skipping Lemwarm", "No monitoring", "Ignoring spam signals"],
        nextStep: "icp",
      },
      {
        id: "icp", code: "03", label: "ICP & Enrichment", color: "#CE93D8", icon: "🎯",
        objective: "Identify the right target audience and build a high-quality enriched lead list ready for outreach.",
        steps: [
          { id: 0, title: "Pre-Work (MANDATORY)", detail: "Review onboarding notes, CRM docs, and align with Sales before defining ICP.", rules: ["Do NOT define ICP blindly", "Escalate if unclear", "Align with Sales team first"], checklist: ["Onboarding notes reviewed", "CRM checked", "Sales team aligned"], mandatory: true },
          { id: 1, title: "ICP Definition", detail: "Define industry, company size, geography, and job titles.", rules: ["Must be approved internally", "Based on existing data — not assumptions"], checklist: ["ICP defined", "Approved internally"] },
          { id: 2, title: "Lead Sourcing", detail: "Source only leads that strictly match the ICP.", rules: ["Zero tolerance for irrelevant companies", "Quality > quantity"], checklist: ["Leads match ICP", "No irrelevant companies included"] },
          { id: 3, title: "Data Enrichment", detail: "Enrich leads with name, company, job title, and email.", rules: ["Enrichment logic must be approved", "Data must be consistent"], checklist: ["All fields filled", "Data consistent and clean"] },
          { id: 4, title: "Personalization Layers", detail: "Add personalization: Basic (name/company), Medium (role/industry), Advanced (custom insights).", rules: ["Must be accurate", "Must feel natural — not robotic"], checklist: ["Variables added", "No broken fields"] },
          { id: 5, title: "Data Cleaning", detail: "Remove duplicates, missing emails, and bad fits.", checklist: ["No duplicates", "No missing emails", "Clean dataset ready"] },
          { id: 6, title: "Pre-Export Review", detail: "Check formatting and completeness before passing to validation.", checklist: ["Formatting verified", "Ready for email validation"] },
        ],
        mistakes: ["Bad ICP definition", "Poor personalization", "Dirty data", "Over-enrichment"],
        nextStep: "validation",
      },
      {
        id: "validation", code: "04", label: "Email Validation", color: "#80CBC4", icon: "✅",
        objective: "Ensure all email addresses are valid and safe to contact to protect deliverability.",
        tools: ["NeverBounce — email verification & list cleaning", "Clay — enrichment + built-in validation workflows"],
        steps: [
          { id: 0, title: "Choose Validation Scenario", detail: "Scenario 1: Leads from Clay → validate in Clay. Scenario 2: Client-provided list → validate in NeverBounce.", rules: ["If data originates in Clay → validate in Clay", "If data comes from outside → validate in NeverBounce", "NEVER skip validation"], checklist: ["Scenario identified", "Correct tool selected"], mandatory: true },
          { id: 1, title: "Import Lead List", detail: "Upload enriched lead list into NeverBounce (if applicable).", rules: ["CSV format required", "All required fields must be present"], checklist: ["File uploaded", "Correct format (CSV)", "All fields present"] },
          { id: 2, title: "Run Verification", detail: "Start verification. Emails categorized as: Valid, Invalid, Catch-all, Risky/Unknown.", checklist: ["Verification complete", "Results categorized"] },
          { id: 3, title: "Filter Results", detail: "Keep Valid emails. Catch-all is optional based on policy. Remove Invalid and Risky/Unknown.", rules: ["Always remove Invalid", "Remove Risky/Unknown unless explicitly approved"], checklist: ["Valid emails kept", "Invalid removed", "Policy applied to catch-all"] },
          { id: 4, title: "Export Clean List", detail: "Export only approved emails into a clean dataset.", checklist: ["Clean dataset exported", "No invalid emails included"] },
          { id: 5, title: "Quality Check", detail: "Final check on bounce risk, formatting, and random samples.", checklist: ["Bounce risk acceptable", "Formatting verified", "Random samples spot-checked", "Ready for campaign import"] },
        ],
        mistakes: ["Skipping validation", "Keeping risky emails", "Not filtering properly", "Uploading wrong dataset"],
        nextStep: "campaign",
      },
      {
        id: "campaign", code: "05", label: "Campaign Creation", color: "#EF9A9A", icon: "📧",
        objective: "Create, launch, and continuously optimize cold email campaigns to generate replies and meetings.",
        steps: [
          { id: 0, title: "Pre-Work Check (MANDATORY)", detail: "Verify all upstream steps are complete before starting campaign.", rules: ["ICP defined ✓", "Leads enriched ✓", "Emails validated ✓", "Domains warmed ✓", "If ANY missing — STOP and fix upstream"], checklist: ["ICP confirmed", "Leads ready", "Validation done", "Domains warmed"], mandatory: true },
          { id: 1, title: "Campaign Structure", detail: "Build a sequence of 3–5 emails spaced 2–4 days apart.", rules: ["Email 1: Initial outreach", "Email 2: Follow-up", "Email 3: Value add", "Email 4+: Breakup", "Each email must stand alone"], checklist: ["Sequence created", "Timing set"] },
          { id: 2, title: "Copywriting", detail: "Write copy following: Relevance > Creativity. Clarity > Cleverness. Short > Long (50–120 words).", rules: ["Structure: Personalization → Reason → Value → CTA", "Simple language", "Easy to read"], checklist: ["Clear value prop", "Simple language", "50–120 words per email"] },
          { id: 3, title: "Personalization", detail: "Apply personalization layers: Basic (name/company), Medium (role/industry), Advanced (custom insights).", rules: ["Must be accurate", "Must feel natural"], checklist: ["Variables working", "No broken fields"] },
          { id: 4, title: "Campaign Setup (Lemlist)", detail: "Configure sending limits (start low), schedule (business hours), and inbox rotation.", checklist: ["Sending limits set", "Schedule configured", "Inboxes assigned"] },
          { id: 5, title: "Internal Validation", detail: "Review copy, personalization, links, and tone internally before client.", checklist: ["Copy reviewed", "Links checked", "Tone approved", "Feedback applied"] },
          { id: 6, title: "Client Validation", detail: "Send draft to client and obtain explicit written approval.", rules: ["DO NOT launch without client approval — non-negotiable"], checklist: ["Draft sent to client", "Approval received"] },
          { id: 7, title: "Final Pre-Launch Check", detail: "Final verification: leads imported correctly, variables working, domains still warmed.", checklist: ["Leads imported correctly", "Variables working", "Domains confirmed warm"] },
          { id: 8, title: "Launch & Monitor", detail: "Launch and monitor closely for first 48 hours. Watch bounce rate (<3%), reply rate, and spam signals.", checklist: ["Campaign launched", "48h monitoring active"] },
          { id: 9, title: "Ongoing Optimization", detail: "Daily monitoring first week. Weekly analysis. A/B test one variable at a time.", rules: ["Never ignore poor performance", "Never scale failing campaigns", "Double down on winners"], checklist: ["Daily monitoring", "Weekly analysis", "A/B tests running", "Winners identified"] },
        ],
        mistakes: ["Long emails", "Generic messaging", "Aggressive CTAs", "No follow-ups", "Broken variables", "Launching without approval"],
        nextStep: null,
      },
    ];

    const statusColors = {
      "not-started": { bg: "#f9fafb", border: "#e5e7eb", label: "Not Started", dot: "#9ca3af" },
      "in-progress":  { bg: "#f0fdf4", border: "#22c55e", label: "In Progress", dot: "#22c55e" },
      "blocked":      { bg: "#fff5f5", border: "#ef4444", label: "Blocked",     dot: "#ef4444" },
      "complete":     { bg: "#eff6ff", border: "#3b82f6", label: "Complete",    dot: "#3b82f6" },
    };

    const campaignStatusColors = {
      active:   { bg: "#f0fdf4", border: "#22c55e", text: "#16a34a", dot: "#22c55e" },
      paused:   { bg: "#fffbeb", border: "#f59e0b", text: "#b45309", dot: "#f59e0b" },
      complete: { bg: "#eff6ff", border: "#3b82f6", text: "#1d4ed8", dot: "#3b82f6" },
      blocked:  { bg: "#fff5f5", border: "#ef4444", text: "#dc2626", dot: "#ef4444" },
    };

    const EMPTY_CAMPAIGN = { client: "", status: "active", stage: "warmup", assignee: "", startDate: "", endDate: "", bounce: "", openRate: "", replyRate: "", notes: "" };

    // ─── MAIN APP ─────────────────────────────────────────────────────────────
    function App() {
      const [activeTab, setActiveTab]   = useState("overview");
      const [checkedItems, setCheckedItems] = useState({});
      const [expandedStep, setExpandedStep] = useState(null);

      const [campaigns, setCampaigns]   = useState([
        { id: 1, client: "WeKount", status: "active", stage: "campaign", assignee: "Anthony", startDate: "2026-03-20", endDate: "2026-06-02", bounce: 1.2, openRate: 38, replyRate: 4.1, notes: "P1 — Évènementiel" },
      ]);
      const [loadingData, setLoadingData] = useState(false);
      const [lastSync, setLastSync]       = useState(null);
      const [syncError, setSyncError]     = useState(null);

      const [clientPipelineStatus,   setClientPipelineStatus]   = useState({});
      const [clientPipelineSelected, setClientPipelineSelected] = useState({});

      const [showAddModal,    setShowAddModal]    = useState(false);
      const [editingCampaign, setEditingCampaign] = useState(null);
      const [newCampaign,     setNewCampaign]     = useState(EMPTY_CAMPAIGN);

      // ── Google Sheets sync ──────────────────────────────────────────────────
      const fetchFromSheet = async () => {
        if (!SHEET_ID) return;
        setLoadingData(true);
        setSyncError(null);
        try {
          const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
          const res  = await fetch(url);
          const text = await res.text();
          // Google wraps the JSON in a callback — strip it
          const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
          const rows = json.table.rows;
          const cols = json.table.cols.map(c => c.label.toLowerCase().trim());

          const parsed = rows.map((row, i) => {
            const get = (label) => {
              const idx = cols.indexOf(label);
              return idx >= 0 && row.c[idx] ? String(row.c[idx].v ?? "").trim() : "";
            };
            return {
              id: i + 1,
              client:    get("client"),
              status:    get("status")    || "active",
              stage:     get("stage")     || "campaign",
              assignee:  get("assignee"),
              startDate: get("startdate"),
              endDate:   get("enddate"),
              bounce:    get("bounce"),
              openRate:  get("openrate"),
              replyRate: get("replyrate"),
              notes:     get("notes"),
            };
          }).filter(r => r.client);

          if (parsed.length > 0) setCampaigns(parsed);
          setLastSync(new Date().toLocaleTimeString());
        } catch (e) {
          setSyncError("Sync failed — check Sheet ID or sharing settings");
        } finally {
          setLoadingData(false);
        }
      };

      useEffect(() => { fetchFromSheet(); }, []);

      // ── Campaign helpers ────────────────────────────────────────────────────
      const saveCampaign = () => {
        if (!newCampaign.client.trim()) return;
        if (editingCampaign !== null) {
          setCampaigns(prev => prev.map(c => c.id === editingCampaign ? { ...newCampaign, id: editingCampaign } : c));
        } else {
          setCampaigns(prev => [...prev, { ...newCampaign, id: Date.now() }]);
        }
        setNewCampaign(EMPTY_CAMPAIGN);
        setEditingCampaign(null);
        setShowAddModal(false);
      };

      const deleteCampaign = (id) => setCampaigns(prev => prev.filter(c => c.id !== id));

      const openEdit = (c) => { setNewCampaign({ ...c }); setEditingCampaign(c.id); setShowAddModal(true); };
      const openAdd  = ()  => { setNewCampaign(EMPTY_CAMPAIGN); setEditingCampaign(null); setShowAddModal(true); };
      const toggleCheck = (key) => setCheckedItems(prev => ({ ...prev, [key]: !prev[key] }));

      const activeCampaigns  = campaigns.filter(c => c.status === "active").length;

      // ── RENDER ──────────────────────────────────────────────────────────────
      return (
        <div style={{ minHeight: "100vh", background: "#f9fafb", color: "#111827", fontFamily: "'DM Sans', sans-serif", fontSize: "13px" }}>

          {/* Top bar */}
          <div style={{ background: "white", borderBottom: "1px solid #e5e7eb", padding: "0 24px", display: "flex", alignItems: "center", height: "52px", gap: 16 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#F5761A" }} />
              <span style={{ color: "#F5761A", fontWeight: "700", letterSpacing: "0.12em", fontSize: "12px" }}>OPS SYSTEM v1.0</span>
            </div>
            <div style={{ flex: 1 }} />
            {/* Sync status */}
            <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: "11px" }}>
              {syncError && <span style={{ color: "#ef4444" }}>⚠ {syncError}</span>}
              {lastSync && !syncError && <span style={{ color: "#9ca3af" }}>↻ synced {lastSync}</span>}
              {SHEET_ID && (
                <button onClick={fetchFromSheet} disabled={loadingData}
                  style={{ background: loadingData ? "#f3f4f6" : "white", border: "1px solid #e5e7eb", borderRadius: 5, padding: "3px 10px", cursor: "pointer", fontSize: "11px", color: "#6b7280" }}>
                  {loadingData ? "Syncing…" : "↻ Sync"}
                </button>
              )}
            </div>
            <div style={{ display: "flex", gap: 4, fontSize: "11px", color: "#9ca3af" }}>
              <span style={{ color: "#22c55e" }}>■</span> {activeCampaigns} ACTIVE
              <span style={{ marginLeft: 10, color: "#9ca3af" }}>■</span> {campaigns.length} TOTAL
            </div>
          </div>

          {/* Nav */}
          <div style={{ background: "#f3f4f6", borderBottom: "1px solid #e5e7eb", padding: "0 24px", display: "flex" }}>
            {["overview", "pipeline", "campaigns", "reference"].map(tab => (
              <button key={tab} onClick={() => setActiveTab(tab)}
                style={{ background: "none", border: "none", cursor: "pointer", padding: "12px 20px", color: activeTab === tab ? "#F5761A" : "#9ca3af", borderBottom: activeTab === tab ? "2px solid #F5761A" : "2px solid transparent", fontFamily: "inherit", fontSize: "11px", letterSpacing: "0.1em", fontWeight: activeTab === tab ? "600" : "400", textTransform: "uppercase", transition: "all 0.15s" }}>
                {tab}
              </button>
            ))}
          </div>

          <div style={{ padding: "24px", maxWidth: 1100, margin: "0 auto" }}>

            {/* ── OVERVIEW TAB ── */}
            {activeTab === "overview" && (
              <OverviewTab campaigns={campaigns} pipelines={pipelines} statusColors={statusColors} campaignStatusColors={campaignStatusColors} clientPipelineStatus={clientPipelineStatus} setClientPipelineStatus={setClientPipelineStatus} openEdit={openEdit} openAdd={openAdd} />
            )}

            {/* ── PIPELINE TAB ── */}
            {activeTab === "pipeline" && (
              <PipelineTab campaigns={campaigns} pipelines={pipelines} statusColors={statusColors} campaignStatusColors={campaignStatusColors} clientPipelineStatus={clientPipelineStatus} setClientPipelineStatus={setClientPipelineStatus} clientPipelineSelected={clientPipelineSelected} setClientPipelineSelected={setClientPipelineSelected} expandedStep={expandedStep} setExpandedStep={setExpandedStep} checkedItems={checkedItems} toggleCheck={toggleCheck} openAdd={openAdd} />
            )}

            {/* ── CAMPAIGNS TAB ── */}
            {activeTab === "campaigns" && (
              <CampaignsTab campaigns={campaigns} setCampaigns={setCampaigns} campaignStatusColors={campaignStatusColors} openEdit={openEdit} openAdd={openAdd} deleteCampaign={deleteCampaign} sheetConnected={!!SHEET_ID} />
            )}

            {/* ── REFERENCE TAB ── */}
            {activeTab === "reference" && <ReferenceTab pipelines={pipelines} />}
          </div>

          {/* ── ADD/EDIT MODAL ── */}
          {showAddModal && (
            <Modal newCampaign={newCampaign} setNewCampaign={setNewCampaign} saveCampaign={saveCampaign} editingCampaign={editingCampaign} onClose={() => setShowAddModal(false)} pipelines={pipelines} />
          )}
        </div>
      );
    }

    // ─── OVERVIEW TAB ────────────────────────────────────────────────────────
    function OverviewTab({ campaigns, pipelines, statusColors, campaignStatusColors, clientPipelineStatus, setClientPipelineStatus, openEdit, openAdd }) {
      return (
        <div>
          <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: 24 }}>
            <div>
              <div style={{ color: "#9ca3af", fontSize: "11px", letterSpacing: "0.1em", marginBottom: 4 }}>OPERATIONAL OVERVIEW</div>
              <div style={{ color: "#111827", fontSize: "18px", fontWeight: "bold" }}>Client Pipeline Status</div>
              <div style={{ color: "#9ca3af", marginTop: 4, fontSize: "12px" }}>Track each client's progress across all 5 pipeline stages independently.</div>
            </div>
            <button onClick={openAdd} style={{ background: "#F5761A", color: "white", border: "none", borderRadius: 7, padding: "9px 16px", cursor: "pointer", fontSize: "12px", fontWeight: "600" }}>+ Add Client</button>
          </div>

          {campaigns.length === 0 ? (
            <EmptyState label="No clients yet" sub='Click "Add Client" to track your first campaign' />
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {campaigns.map(c => {
                const csc = campaignStatusColors[c.status] || campaignStatusColors.active;
                const clientStages = clientPipelineStatus[c.id] || {};
                return (
                  <div key={c.id} style={{ background: "white", border: "1px solid #e5e7eb", borderRadius: 12, overflow: "hidden" }}>
                    {/* Header */}
                    <div style={{ padding: "14px 18px", borderBottom: "1px solid #f3f4f6", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <ClientAvatar name={c.client} />
                        <div>
                          <div style={{ fontWeight: "700", fontSize: "15px", color: "#111827" }}>{c.client}</div>
                          <div style={{ fontSize: "11px", color: "#9ca3af", marginTop: 1 }}>
                            {c.notes && <span>{c.notes} · </span>}
                            {c.assignee && <span>👤 {c.assignee}</span>}
                            {c.startDate && <span> · 📅 {c.startDate}{c.endDate ? ` → ${c.endDate}` : ""}</span>}
                          </div>
                        </div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <StatusBadge status={c.status} colors={csc} />
                        <button onClick={() => openEdit(c)} style={{ background: "none", border: "1px solid #e5e7eb", borderRadius: 5, padding: "4px 10px", cursor: "pointer", fontSize: "11px", color: "#6b7280" }}>Edit</button>
                      </div>
                    </div>
                    {/* Stage tracker */}
                    <div style={{ padding: "14px 18px" }}>
                      <div style={{ fontSize: "10px", color: "#9ca3af", letterSpacing: "0.08em", marginBottom: 10 }}>PIPELINE STAGES</div>
                      <div style={{ display: "flex", gap: 6, alignItems: "stretch", flexWrap: "wrap" }}>
                        {pipelines.map((p, i) => {
                          const stageStatus = clientStages[p.id] || "not-started";
                          const ssc = statusColors[stageStatus];
                          const isCurrent = c.stage === p.id;
                          return (
                            <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 6, flex: 1, minWidth: 120 }}>
                              <div style={{ flex: 1, background: ssc.bg, border: `1px solid ${isCurrent ? p.color : ssc.border}`, borderTop: `3px solid ${isCurrent ? p.color : ssc.border}`, borderRadius: 7, padding: "10px 10px 8px" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                                  <span style={{ fontSize: "11px", fontWeight: "600", color: isCurrent ? p.color : "#374151" }}>{p.icon} {p.label}</span>
                                  {isCurrent && <span style={{ fontSize: "9px", background: p.color + "22", color: p.color, padding: "1px 5px", borderRadius: 3, fontWeight: "600" }}>ACTIVE</span>}
                                </div>
                                <div style={{ display: "flex", gap: 3, flexWrap: "wrap" }}>
                                  {["not-started", "in-progress", "blocked", "complete"].map(st => (
                                    <button key={st} onClick={() => setClientPipelineStatus(prev => ({ ...prev, [c.id]: { ...prev[c.id], [p.id]: st } }))}
                                      style={{ background: stageStatus === st ? statusColors[st].dot : "#f3f4f6", border: `1px solid ${stageStatus === st ? statusColors[st].dot : "#e5e7eb"}`, color: stageStatus === st ? "white" : "#9ca3af", padding: "2px 5px", borderRadius: 3, cursor: "pointer", fontSize: "8px", letterSpacing: "0.04em", whiteSpace: "nowrap" }}>
                                      {st.replace("-", " ")}
                                    </button>
                                  ))}
                                </div>
                              </div>
                              {i < pipelines.length - 1 && <span style={{ color: "#d1d5db", fontSize: "14px", flexShrink: 0 }}>→</span>}
                            </div>
                          );
                        })}
                      </div>
                      {/* Health metrics */}
                      {(c.bounce !== "" || c.openRate !== "" || c.replyRate !== "") && (
                        <div style={{ display: "flex", gap: 16, marginTop: 12, paddingTop: 12, borderTop: "1px solid #f3f4f6" }}>
                          {[
                            { label: "Bounce", value: c.bounce, warn: parseFloat(c.bounce) > 3, good: parseFloat(c.bounce) <= 1.5 },
                            { label: "Open Rate", value: c.openRate, warn: parseFloat(c.openRate) < 20, good: parseFloat(c.openRate) >= 35 },
                            { label: "Reply Rate", value: c.replyRate, warn: parseFloat(c.replyRate) < 2, good: parseFloat(c.replyRate) >= 5 },
                          ].filter(m => m.value !== "").map(({ label, value, warn, good }) => (
                            <div key={label} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                              <span style={{ fontFamily: "'DM Mono', monospace", fontSize: "13px", fontWeight: "700", color: warn ? "#ef4444" : good ? "#16a34a" : "#374151" }}>{value}%</span>
                              <span style={{ fontSize: "11px", color: "#9ca3af" }}>{label}</span>
                              <span style={{ fontSize: "10px", color: warn ? "#ef4444" : good ? "#16a34a" : "transparent" }}>{warn ? "⚠" : "✓"}</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // ─── PIPELINE TAB ────────────────────────────────────────────────────────
    function PipelineTab({ campaigns, pipelines, statusColors, campaignStatusColors, clientPipelineStatus, setClientPipelineStatus, clientPipelineSelected, setClientPipelineSelected, expandedStep, setExpandedStep, checkedItems, toggleCheck, openAdd }) {
      return (
        <div>
          <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: 24 }}>
            <div>
              <div style={{ color: "#9ca3af", fontSize: "11px", letterSpacing: "0.1em", marginBottom: 4 }}>PIPELINE</div>
              <div style={{ color: "#111827", fontSize: "18px", fontWeight: "bold" }}>Client Checklists</div>
              <div style={{ color: "#9ca3af", marginTop: 4, fontSize: "12px" }}>Step-by-step pipeline checklists per client campaign.</div>
            </div>
            <button onClick={openAdd} style={{ background: "#F5761A", color: "white", border: "none", borderRadius: 7, padding: "9px 16px", cursor: "pointer", fontSize: "12px", fontWeight: "600" }}>+ Add Client</button>
          </div>

          {campaigns.length === 0 ? (
            <EmptyState label="No clients yet" sub='Click "Add Client" to get started' />

            <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
              {campaigns.map(c => {
                const csc = campaignStatusColors[c.status] || campaignStatusColors.active;
                const expandedKey = `pipelineClient-${c.id}`;
                const isClientExpanded = expandedStep === expandedKey || campaigns.length === 1;
                const activePipelineId = clientPipelineSelected[c.id] || c.stage || pipelines[0].id;
                const activePipeline = pipelines.find(p => p.id === activePipelineId);

                return (

                      style={{ padding: "14px 18px", cursor: "pointer", borderBottom: isClientExpanded ? "1px solid #f3f4f6" : "none", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <ClientAvatar name={c.client} />
                        <div>
                          <div style={{ fontWeight: "700", fontSize: "15px", color: "#111827" }}>{c.client}</div>
                          <div style={{ fontSize: "11px", color: "#9ca3af", marginTop: 1 }}>
                            {c.notes && <span>{c.notes} · </span>}{c.assignee && <span>👤 {c.assignee}</span>}
                          </div>
                        </div>
                        <StatusBadge status={c.status} colors={csc} />
                      </div>
                      <span style={{ color: "#9ca3af", fontSize: "12px" }}>{isClientExpanded ? "▲" : "▼"}</span>
                    </div>

                    {isClientExpanded && activePipeline && (
                      <div style={{ padding: "0 18px 18px" }}>

                        <div style={{ display: "flex", gap: 4, paddingTop: 14, paddingBottom: 14, overflowX: "auto" }}>
                          {pipelines.map(p => {
                            const isActive = activePipelineId === p.id;
                            const stageStatus = (clientPipelineStatus[c.id] || {})[p.id] || "not-started";
                            return (
                              <button key={p.id} onClick={() => setClientPipelineSelected(prev => ({ ...prev, [c.id]: p.id }))}
                                style={{ padding: "6px 12px", borderRadius: 7, cursor: "pointer", border: isActive ? `1px solid ${p.color}` : "1px solid #e5e7eb", background: isActive ? p.color + "12" : "#f9fafb", fontSize: "11px", fontWeight: isActive ? "600" : "400", color: isActive ? p.color : "#6b7280", display: "flex", alignItems: "center", gap: 6, whiteSpace: "nowrap", flexShrink: 0, transition: "all 0.15s" }}>
                                <span>{p.icon}</span><span>{p.label}</span>
                                <div style={{ width: 6, height: 6, borderRadius: "50%", background: statusColors[stageStatus].dot }} />
                              </button>
                            );
                          })}
                        </div>

                        {/* Objective */}
                        <div style={{ background: "#f9fafb", border: `1px solid ${activePipeline.color}33`, borderLeft: `3px solid ${activePipeline.color}`, borderRadius: 8, padding: "10px 14px", marginBottom: 14, fontSize: "12px", color: "#6b7280" }}>
                          <span style={{ color: activePipeline.color, fontSize: "10px", letterSpacing: "0.1em" }}>OBJECTIVE — </span>{activePipeline.objective}
                        </div>

                        {/* Tools */}
                        {activePipeline.tools && (
                          <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
                            {activePipeline.tools.map(t => (
                              <div key={t} style={{ background: "#f3f4f6", border: "1px solid #e5e7eb", borderRadius: 4, padding: "4px 10px", fontSize: "11px", color: "#6b7280" }}>🔧 {t}</div>

                          </div>

                        {/* Steps */}
                        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>

                            const key = `${c.id}-${activePipeline.id}-${step.id}`;
                            const isExp = expandedStep === key;
                            const total = step.checklist?.length || 0;
                            const done  = step.checklist?.filter((_, ci) => checkedItems[`${key}-${ci}`]).length || 0;
                            const allDone = total > 0 && done === total;
                            return (
                              <div key={key} style={{ background: allDone ? "#f0fdf4" : "white", border: `1px solid ${allDone ? "#bbf7d0" : step.mandatory ? activePipeline.color + "33" : "#e5e7eb"}`, borderLeft: `3px solid ${allDone ? "#22c55e" : step.mandatory ? activePipeline.color : "#e5e7eb"}`, borderRadius: 8, overflow: "hidden" }}>
                                <div onClick={() => setExpandedStep(isExp ? null : key)}
                                  style={{ padding: "11px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}>
                                  <div style={{ width: 22, height: 22, borderRadius: "50%", flexShrink: 0, background: allDone ? "#22c55e" : "#f3f4f6", border: `1px solid ${allDone ? "#22c55e" : "#d1d5db"}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "10px", color: allDone ? "white" : "#9ca3af", fontWeight: "bold" }}>
                                    {allDone ? "✓" : (idx + 1)}
                                  </div>
                                  <div style={{ flex: 1 }}>
                                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                      <span style={{ color: allDone ? "#16a34a" : "#111827", fontWeight: "600", fontSize: "13px" }}>{step.title}</span>
                                      {step.mandatory && <span style={{ background: activePipeline.color + "22", color: activePipeline.color, fontSize: "9px", padding: "1px 5px", borderRadius: 3, letterSpacing: "0.08em" }}>MANDATORY</span>}
                                    </div>
                                    {!isExp && <div style={{ color: "#9ca3af", fontSize: "11px", marginTop: 2 }}>{step.detail}</div>}
                                  </div>
                                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                    {total > 0 && <span style={{ color: allDone ? "#16a34a" : "#9ca3af", fontSize: "10px" }}>{done}/{total}</span>}
                                    <span style={{ color: "#9ca3af", fontSize: "12px" }}>{isExp ? "▲" : "▼"}</span>
                                  </div>
                                </div>
                                {isExp && (
                                  <div style={{ padding: "0 14px 14px 46px", borderTop: "1px solid #f3f4f6" }}>
                                    <div style={{ paddingTop: 12, color: "#6b7280", fontSize: "12px", marginBottom: 12, lineHeight: 1.6 }}>{step.detail}</div>
                                    {step.rules && (
                                      <div style={{ marginBottom: 12 }}>
                                        <div style={{ color: "#9ca3af", fontSize: "10px", letterSpacing: "0.1em", marginBottom: 6 }}>RULES</div>
                                        {step.rules.map((r, i) => <div key={i} style={{ color: "#6b7280", fontSize: "11px", marginBottom: 3, paddingLeft: 8, borderLeft: "2px solid #e5e7eb" }}>{r}</div>)}
                                      </div>
                                    )}
                                    {step.checklist && (
                                      <div>
                                        <div style={{ color: "#9ca3af", fontSize: "10px", letterSpacing: "0.1em", marginBottom: 6 }}>CHECKLIST</div>
                                        {step.checklist.map((item, ci) => {
                                          const ck = `${key}-${ci}`;
                                          const checked = !!checkedItems[ck];
                                          return (
                                            <div key={ci} onClick={() => toggleCheck(ck)} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0", cursor: "pointer" }}>
                                              <div style={{ width: 14, height: 14, borderRadius: 3, flexShrink: 0, background: checked ? "#22c55e" : "white", border: `1px solid ${checked ? "#22c55e" : "#d1d5db"}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "9px", color: "white" }}>{checked ? "✓" : ""}</div>
                                              <span style={{ color: checked ? "#16a34a" : "#374151", fontSize: "12px", textDecoration: checked ? "line-through" : "none" }}>{item}</span>
                                            </div>
                                          );
                                        })}
                                      </div>
                                    )}
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>

                        {/* Mistakes */}
                        <div style={{ background: "#fff5f5", border: "1px solid #fecaca", borderRadius: 8, padding: "12px 14px", marginTop: 14 }}>
                          <div style={{ color: "#ef4444", fontSize: "10px", letterSpacing: "0.1em", marginBottom: 8 }}>⚠ COMMON MISTAKES</div>
                          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                            {activePipeline.mistakes.map((m, i) => <span key={i} style={{ background: "#fee2e2", border: "1px solid #fecaca", color: "#dc2626", fontSize: "11px", padding: "3px 8px", borderRadius: 4 }}>{m}</span>)}
                          </div>
                        </div>

                        {/* Next stage */}
                        {activePipeline.nextStep && (
                          <div style={{ marginTop: 12, textAlign: "right" }}>
                            <button onClick={() => setClientPipelineSelected(prev => ({ ...prev, [c.id]: activePipeline.nextStep }))}
                              style={{ background: "white", border: `1px solid ${pipelines.find(p => p.id === activePipeline.nextStep)?.color}`, color: pipelines.find(p => p.id === activePipeline.nextStep)?.color, padding: "7px 14px", borderRadius: 6, cursor: "pointer", fontSize: "11px", letterSpacing: "0.06em" }}>
                              Next: {pipelines.find(p => p.id === activePipeline.nextStep)?.label} →
                            </button>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // ─── CAMPAIGNS TAB ───────────────────────────────────────────────────────
    function CampaignsTab({ campaigns, campaignStatusColors, openEdit, openAdd, deleteCampaign, sheetConnected }) {

    // ─── MODAL ───────────────────────────────────────────────────────────────
    function Modal({ newCampaign, setNewCampaign, saveCampaign, editingCampaign, onClose, pipelines }) {
      const fields = [
        { label: "Client Name *", key: "client",    type: "text",   placeholder: "e.g. WeKount" },
        { label: "Assignee",      key: "assignee",  type: "text",   placeholder: "e.g. Anthony" },
        { label: "Start Date",    key: "startDate", type: "date" },
        { label: "End Date",      key: "endDate",   type: "date" },
        { label: "Notes / Campaign Name", key: "notes", type: "text", placeholder: "e.g. P1 — Évènementiel" },
        { label: "Bounce Rate (%)",  key: "bounce",    type: "number", placeholder: "e.g. 1.2" },
        { label: "Open Rate (%)",    key: "openRate",  type: "number", placeholder: "e.g. 38" },
        { label: "Reply Rate (%)",   key: "replyRate", type: "number", placeholder: "e.g. 4.1" },
      ];
      return (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}>
          <div style={{ background: "white", borderRadius: 12, padding: 24, width: 480, maxHeight: "90vh", overflowY: "auto", boxShadow: "0 20px 60px rgba(0,0,0,0.15)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <span style={{ fontWeight: "700", fontSize: "15px", color: "#111827" }}>{editingCampaign !== null ? "Edit Campaign" : "Add Campaign"}</span>
              <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#9ca3af" }}>✕</button>
            </div>
            {fields.map(({ label, key, type, placeholder }) => (
              <div key={key} style={{ marginBottom: 12 }}>
                <label style={{ display: "block", fontSize: "11px", color: "#6b7280", marginBottom: 4, fontWeight: "500", letterSpacing: "0.05em" }}>{label.toUpperCase()}</label>
                <input type={type} placeholder={placeholder} value={newCampaign[key]} onChange={e => setNewCampaign(prev => ({ ...prev, [key]: e.target.value }))}
                  style={{ width: "100%", padding: "8px 10px", borderRadius: 6, border: "1px solid #e5e7eb", fontSize: "13px", color: "#111827", outline: "none", boxSizing: "border-box" }} />
              </div>
            ))}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
              <div>
                <label style={{ display: "block", fontSize: "11px", color: "#6b7280", marginBottom: 4, fontWeight: "500", letterSpacing: "0.05em" }}>STATUS</label>
                <select value={newCampaign.status} onChange={e => setNewCampaign(p => ({ ...p, status: e.target.value }))}
                  style={{ width: "100%", padding: "8px 10px", borderRadius: 6, border: "1px solid #e5e7eb", fontSize: "13px", color: "#111827", background: "white" }}>
                  {["active","paused","complete","blocked"].map(s => <option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}
                </select>
              </div>
              <div>
                <label style={{ display: "block", fontSize: "11px", color: "#6b7280", marginBottom: 4, fontWeight: "500", letterSpacing: "0.05em" }}>PIPELINE STAGE</label>
                <select value={newCampaign.stage} onChange={e => setNewCampaign(p => ({ ...p, stage: e.target.value }))}
                  style={{ width: "100%", padding: "8px 10px", borderRadius: 6, border: "1px solid #e5e7eb", fontSize: "13px", color: "#111827", background: "white" }}>
                  {pipelines.map(p => <option key={p.id} value={p.id}>{p.code} — {p.label}</option>)}
                </select>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 20 }}>
              <button onClick={onClose} style={{ flex: 1, padding: "10px", border: "1px solid #e5e7eb", borderRadius: 7, background: "none", cursor: "pointer", fontSize: "13px", color: "#6b7280" }}>Cancel</button>
              <button onClick={saveCampaign} style={{ flex: 2, padding: "10px", border: "none", borderRadius: 7, background: "#F5761A", cursor: "pointer", fontSize: "13px", fontWeight: "600", color: "white" }}>
                {editingCampaign !== null ? "Save Changes" : "Add Campaign"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── SHARED COMPONENTS ───────────────────────────────────────────────────
    function ClientAvatar({ name }) {
      return (
        <div style={{ width: 34, height: 34, borderRadius: 8, background: "#F5761A22", border: "1px solid #F5761A44", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "14px", fontWeight: "800", color: "#F5761A", flexShrink: 0 }}>
          {name.charAt(0).toUpperCase()}
        </div>
      );
    }

    function StatusBadge({ status, colors }) {
      return (
        <div style={{ background: colors.bg, border: `1px solid ${colors.border}`, borderRadius: 99, padding: "3px 10px", fontSize: "10px", color: colors.text, fontWeight: "600", textTransform: "capitalize" }}>
          {status}
        </div>
      );
    }

    function EmptyState({ label, sub }) {
      return (
        <div style={{ background: "white", border: "1px dashed #e5e7eb", borderRadius: 10, padding: "48px 24px", textAlign: "center" }}>
          <div style={{ fontSize: 32, marginBottom: 10 }}>📋</div>
          <div style={{ color: "#374151", fontWeight: "600", marginBottom: 4 }}>{label}</div>
          <div style={{ color: "#9ca3af", fontSize: "12px" }}>{sub}</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
