<style>

/* topbar */

#nav button.active { color: #F5761A; border-bottom: 2px solid #F5761A; font-weight: 600; }
/* content */

// ═══════════════ HELPERS ═══════════════
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'style' && typeof v === 'object') {
        Object.assign(el.style, v);
      } else if (k.startsWith('on') && typeof v === 'function') {
        el.addEventListener(k.slice(2).toLowerCase(), v);
      } else if (k === 'className') {
        el.className = v;
      } else if (k === 'htmlFor') {
        el.htmlFor = v;
      } else {
        el.setAttribute(k, v);
      }
    }
  }
  for (const child of children.flat()) {
    if (child === null || child === undefined) continue;
    if (typeof child === 'string' || typeof child === 'number') {
      el.appendChild(document.createTextNode(String(child)));
    } else if (child instanceof Node) {
      el.appendChild(child);
    }
  }
  return el;
}

function div(attrs, ...children) { return h('div', attrs, ...children); }
function span(attrs, ...children) { return h('span', attrs, ...children); }
function btn(attrs, ...children) { return h('button', attrs, ...children); }

function computeSignals(c) {
  const flags = [];
  const bounceVal = parseFloat(c.bounce), openVal = parseFloat(c.openRate), replyVal = parseFloat(c.replyRate);
  const totalL = parseFloat(c.totalLeads) || 0, contacted = parseFloat(c.leadsContacted) || 0;
  const remaining = totalL - contacted, pctLeft = totalL > 0 ? (remaining / totalL) * 100 : null;
  const ls = leadscores[c.id];
  if (c.status === "paused") flags.push({ level: "warn", msg: "Campaign paused", action: "Resume or investigate block", owner: c.assignee || "—" });
  if (c.status === "blocked") flags.push({ level: "red", msg: "Campaign blocked", action: "Identify and unblock immediately", owner: c.assignee || "—" });
  if (!isNaN(bounceVal) && bounceVal > 3) flags.push({ level: "red", msg: `Bounce rate critical (${bounceVal}%)`, action: "Pause campaign, audit list quality", owner: c.assignee || "—" });
  else if (!isNaN(bounceVal) && bounceVal > 1.5) flags.push({ level: "warn", msg: `Bounce rate elevated (${bounceVal}%)`, action: "Monitor daily, consider list cleanup", owner: c.assignee || "—" });
  if (!isNaN(openVal) && openVal < 20) flags.push({ level: "warn", msg: `Open rate low (${openVal}%)`, action: "Review subject lines and sender reputation", owner: c.assignee || "—" });
  if (!isNaN(replyVal) && replyVal < 2) flags.push({ level: "warn", msg: `Reply rate low (${replyVal}%)`, action: "Rework copy — test new angle or CTA", owner: c.assignee || "—" });
  if (pctLeft !== null && pctLeft < 10 && remaining > 0) flags.push({ level: "red", msg: `Running out of leads (${Math.round(pctLeft)}% left)`, action: "Start new Clay enrichment / ICP sourcing now", owner: "Anthony" });
  else if (pctLeft !== null && pctLeft < 25) flags.push({ level: "warn", msg: `Leads running low (${Math.round(pctLeft)}% left)`, action: "Plan next batch of leads", owner: "Anthony" });
  if (ls && ls.hot > 0) flags.push({ level: "info", msg: `${ls.hot} hot lead${ls.hot > 1 ? "s" : ""} waiting`, action: "Follow up with hot leads now", owner: c.assignee || "—" });
  const clientDomains = domains.filter(d => d.client === (c.account || c.client));
  if (clientDomains.some(d => d.blacklisted)) flags.push({ level: "red", msg: "Sending domain blacklisted", action: "Switch to clean domain immediately", owner: "Anthony" });
  if (clientDomains.some(d => !d.lemwarmActive)) flags.push({ level: "warn", msg: "Lemwarm inactive on a domain", action: "Reactivate Lemwarm", owner: "Anthony" });
  const health = flags.some(f => f.level === "red") ? "red" : flags.some(f => f.level === "warn") ? "warn" : flags.length === 0 && c.status === "active" ? "green" : "neutral";
  return { flags, health };
}

          div({ style: { fontSize: "12px", color: "#9ca3af", marginTop: "4px" } }, "👤 " + topFlag.owner)

      div({ style: { display: "flex", gap: "5px", flexWrap: "wrap", justifyContent: "flex-end", maxWidth: "400px" } },
        ...ac.map(c => {

      { label: "Total Leads", value: totalLeads > 0 ? totalLeads.toLocaleString() : "—" },
      { label: "Leads Left", value: totalLeads > 0 ? (leadsRemaining > 0 ? leadsRemaining.toLocaleString() : "0") : "—", highlight: leadsRemaining > 0 },
      { label: "Open Rate", value: avgOpen !== null ? avgOpen.toFixed(1) + "%" : "—", warn: avgOpen !== null && avgOpen < 20, good: avgOpen !== null && avgOpen >= 35 },
      { label: "Reply Rate", value: avgReply !== null ? avgReply.toFixed(1) + "%" : "—", warn: avgReply !== null && avgReply < 2, good: avgReply !== null && avgReply >= 5 },
      { label: totalBooked > 0 ? "Booked" : "Interested", value: totalBooked > 0 ? String(totalBooked) : (totalInterested > 0 ? String(totalInterested) : "—"), good: totalBooked > 0 || totalInterested > 0 },
    ];
    metrics.forEach(({ label, value, warn, good, highlight }) => {
      metricsGrid.appendChild(div({ style: { background: "#f9fafb", borderRadius: "8px", padding: "10px 8px", textAlign: "center", border: "1px solid #f3f4f6" } },
        div({ style: { fontSize: "17px", fontWeight: "700", fontFamily: "'DM Mono', monospace", color: warn ? "#ef4444" : good ? "#16a34a" : highlight ? "#F5761A" : "#111827" } }, value),
        div({ style: { fontSize: "10px", color: "#9ca3af", marginTop: "2px" } }, label)
      ));

    cardBody.appendChild(metricsGrid);
    cardBody.appendChild(div({ style: { fontSize: "10px", color: "#9ca3af", letterSpacing: "0.08em", marginBottom: "7px" } }, "CAMPAIGNS"));
    const campList = div({ style: { display: "flex", flexDirection: "column", gap: "5px" } });
    ac.forEach(c => {

      const stageObj = pipelines.find(p => p.id === c.stage);
      const row = div({ style: { display: "flex", alignItems: "center", gap: "10px", background: "#fafafa", borderRadius: "7px", padding: "8px 12px", border: "1px solid #f3f4f6" } },

        )
      );
      if (stageObj) row.appendChild(div({ style: { background: stageObj.color + "15", border: `1px solid ${stageObj.color}33`, borderRadius: "5px", padding: "2px 8px", fontSize: "10px", color: stageObj.color, fontWeight: "600" } }, stageObj.icon + " " + stageObj.label));
      row.appendChild(btn({ style: { background: "none", border: "1px solid #e5e7eb", borderRadius: "5px", padding: "3px 8px", cursor: "pointer", fontSize: "10px", color: "#6b7280" }, onclick: () => openCampaignModal(c) }, "Edit"));
      campList.appendChild(row);
    });
    cardBody.appendChild(campList);
    card.appendChild(cardBody);
    list.appendChild(card);
  });
  wrap.appendChild(list);
  return wrap;

// ═══════════════ PIPELINE TAB ═══════════════
function renderPipeline() {
  const wrap = div({});
  const header = div({ style: { display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: "24px" } },
    div({},
      div({ style: { color: "#9ca3af", fontSize: "11px", letterSpacing: "0.1em", marginBottom: "4px" } }, "PIPELINE"),

      div({ style: { display: "flex", alignItems: "center", gap: "12px" } },
        div({ style: { width: "34px", height: "34px", borderRadius: "8px", background: "#F5761A22", border: "1px solid #F5761A44", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "14px", fontWeight: "800", color: "#F5761A" } }, c.client.charAt(0).toUpperCase()),
        div({},
          div({ style: { fontWeight: "700", fontSize: "15px", color: "#111827" } }, c.client),
          div({ style: { fontSize: "11px", color: "#9ca3af", marginTop: "1px" } },
            c.notes ? span({}, c.notes + " · ") : null,
            c.assignee ? span({}, "👤 " + c.assignee) : null
          )
        ),
        div({ style: { background: csc.bg, border: `1px solid ${csc.border}`, borderRadius: "99px", padding: "3px 10px", fontSize: "10px", color: csc.text, fontWeight: "600", textTransform: "capitalize" } }, c.status)
      ),
      span({ style: { color: "#9ca3af", fontSize: "12px" } }, isExpanded ? "▲" : "▼")
    );
    cardHead.addEventListener('click', () => {
      clientPipelineExpanded[c.id] = !isExpanded;
      renderContent();
    });
    card.appendChild(cardHead);

    if (isExpanded) {
      const body = div({ style: { padding: "0 18px 18px" } });
      // Pipeline tabs
      const tabs = div({ style: { display: "flex", gap: "4px", paddingTop: "14px", paddingBottom: "14px", overflowX: "auto" } });
      pipelines.forEach(p => {
        const isActive = activePipelineId === p.id;
        const tb = btn({
          style: { padding: "6px 12px", borderRadius: "7px", cursor: "pointer", border: isActive ? `1px solid ${p.color}` : "1px solid #e5e7eb", background: isActive ? p.color + "12" : "#f9fafb", fontSize: "11px", fontWeight: isActive ? "600" : "400", color: isActive ? p.color : "#6b7280", display: "flex", alignItems: "center", gap: "6px", whiteSpace: "nowrap", flexShrink: "0" },
          onclick: () => { clientPipelineSelected[c.id] = p.id; renderContent(); }
        }, p.icon + " " + p.label);

      });

          span({ style: { color: activePipeline.color, fontSize: "10px", letterSpacing: "0.1em" } }, "OBJECTIVE — "),
          activePipeline.objective
        ));

        if (activePipeline.tools) {
          const toolRow = div({ style: { display: "flex", gap: "6px", marginBottom: "14px", flexWrap: "wrap" } });
          activePipeline.tools.forEach(t => toolRow.appendChild(div({ style: { background: "#f3f4f6", border: "1px solid #e5e7eb", borderRadius: "4px", padding: "4px 10px", fontSize: "11px", color: "#6b7280" } }, "🔧 " + t)));
          body.appendChild(toolRow);
        }

        const stepsContainer = div({ style: { display: "flex", flexDirection: "column", gap: "6px" } });
        activePipeline.steps.forEach((step, idx) => {
          const key = `${c.id}-${activePipeline.id}-${step.id}`;
          const isStepExpanded = expandedPipelineStep === key;
          const totalChecks = step.checklist ? step.checklist.length : 0;
          const doneChecks = step.checklist ? step.checklist.filter((_, ci) => checkedItems[`${key}-${ci}`]).length : 0;
          const allDone = totalChecks > 0 && doneChecks === totalChecks;

          const stepEl = div({ style: { background: allDone ? "#f0fdf4" : "white", border: `1px solid ${allDone ? "#bbf7d0" : step.mandatory ? activePipeline.color + "33" : "#e5e7eb"}`, borderLeft: `3px solid ${allDone ? "#22c55e" : step.mandatory ? activePipeline.color : "#e5e7eb"}`, borderRadius: "8px", overflow: "hidden" } });
          const stepHead = div({ style: { padding: "11px 14px", cursor: "pointer", display: "flex", alignItems: "center", gap: "10px" } },
            div({ style: { width: "22px", height: "22px", borderRadius: "50%", flexShrink: "0", background: allDone ? "#22c55e" : "#f3f4f6", border: `1px solid ${allDone ? "#22c55e" : "#d1d5db"}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "10px", color: allDone ? "white" : "#9ca3af", fontWeight: "bold" } }, allDone ? "✓" : (idx + 1)),
            div({ style: { flex: "1" } },
              div({ style: { display: "flex", alignItems: "center", gap: "8px" } },
                span({ style: { color: allDone ? "#16a34a" : "#111827", fontWeight: "600", fontSize: "13px" } }, step.title),
                step.mandatory ? span({ style: { background: activePipeline.color + "22", color: activePipeline.color, fontSize: "9px", padding: "1px 5px", borderRadius: "3px" } }, "MANDATORY") : null
              ),
              !isStepExpanded ? div({ style: { color: "#9ca3af", fontSize: "11px", marginTop: "2px" } }, step.detail) : null
            ),
            div({ style: { display: "flex", alignItems: "center", gap: "8px" } },

              span({ style: { color: "#9ca3af", fontSize: "12px" } }, isStepExpanded ? "▲" : "▼")
            )
          );
          stepHead.addEventListener('click', () => {
            expandedPipelineStep = isStepExpanded ? null : key;

                div({ style: { color: "#9ca3af", fontSize: "10px", letterSpacing: "0.1em", marginBottom: "6px" } }, "RULES"),

              ));
            }
            if (step.checklist) {
              const clWrap = div({},
                div({ style: { color: "#9ca3af", fontSize: "10px", letterSpacing: "0.1em", marginBottom: "6px" } }, "CHECKLIST")

                  span({ style: { color: checked ? "#16a34a" : "#374151", fontSize: "12px", textDecoration: checked ? "line-through" : "none" } }, item)
                );
                row.addEventListener('click', () => { checkedItems[ck] = !checkedItems[ck]; renderContent(); });
                clWrap.appendChild(row);
              });
              stepBody.appendChild(clWrap);
            }
            stepEl.appendChild(stepBody);
          }
          stepsContainer.appendChild(stepEl);
        });
        body.appendChild(stepsContainer);

        const mistakesBox = div({ style: { background: "#fff5f5", border: "1px solid #fecaca", borderRadius: "8px", padding: "12px 14px", marginTop: "14px" } },
          div({ style: { color: "#ef4444", fontSize: "10px", letterSpacing: "0.1em", marginBottom: "8px" } }, "⚠ COMMON MISTAKES"),
          div({ style: { display: "flex", gap: "6px", flexWrap: "wrap" } },
            ...activePipeline.mistakes.map(m => span({ style: { background: "#fee2e2", border: "1px solid #fecaca", color: "#dc2626", fontSize: "11px", padding: "3px 8px", borderRadius: "4px" } }, m))
          )

        body.appendChild(mistakesBox);

        if (activePipeline.nextStep) {

          const nextRow = div({ style: { marginTop: "12px", textAlign: "right" } },
            btn({
              style: { background: "white", border: `1px solid ${nextPipeline.color}`, color: nextPipeline.color, padding: "7px 14px", borderRadius: "6px", cursor: "pointer", fontSize: "11px" },
              onclick: () => { clientPipelineSelected[c.id] = activePipeline.nextStep; renderContent(); }

          );
          body.appendChild(nextRow);
        }
      }
      card.appendChild(body);
    }
    list.appendChild(card);
  });
  wrap.appendChild(list);
  return wrap;
}

// ═══════════════ CAMPAIGNS TAB ═══════════════
function renderCampaigns() {
  const wrap = div({});
  const header = div({ style: { display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: "16px" } },
    div({},
      div({ style: { color: "#9ca3af", fontSize: "11px", letterSpacing: "0.1em", marginBottom: "4px" } }, "ONGOING CAMPAIGNS"),

    ),
    btn({ style: { background: "#F5761A", color: "white", border: "none", borderRadius: "7px", padding: "9px 16px", cursor: "pointer", fontSize: "12px", fontWeight: "600" }, onclick: () => openCampaignModal() }, "+ Add Campaign")
  );

  if (campaigns.length > 0) {
    const accountNames = [...new Set(campaigns.map(c => c.account || c.client))];
    const filterBar = div({ style: { display: "flex", gap: "0", marginBottom: "16px", background: "white", border: "1px solid #e5e7eb", borderRadius: "8px", overflow: "hidden" } });
    ["all", ...accountNames].forEach(name => {
      const isActive = campaignClientFilter === name;
      const count = name === "all" ? campaigns.length : campaigns.filter(c => (c.account || c.client) === name).length;
      const b = btn({
        style: { background: isActive ? "#F5761A" : "white", color: isActive ? "white" : "#6b7280", border: "none", borderRight: "1px solid #e5e7eb", padding: "9px 16px", cursor: "pointer", fontSize: "11px", fontWeight: isActive ? "600" : "400", display: "flex", alignItems: "center", gap: "6px" },

      }, name === "all" ? "All" : name,

          style: { display: "flex", alignItems: "center", gap: "4px", background: ap?.done ? "#f0fdf4" : "#f9fafb", border: `1px solid ${ap?.done ? "#22c55e" : "#e5e7eb"}`, borderRadius: "5px", padding: "3px 9px", cursor: "pointer", fontSize: "10px", color: ap?.done ? "#16a34a" : "#9ca3af", fontWeight: ap?.done ? "600" : "400" },

      );
      const nsWrap = div({});
      nsWrap.appendChild(nsBtn);

      if (isNSOpen) {

              if (!campaignNextSteps[c.id]) campaignNextSteps[c.id] = { note: "", items: [] };
              campaignNextSteps[c.id].items = campaignNextSteps[c.id].items.map(it => it.id === item.id ? { ...it, done: !it.done } : it);
              renderContent();
            });
            itemRow.appendChild(cb);
            itemRow.appendChild(span({ style: { flex: "1", fontSize: "12px", color: item.done ? "#9ca3af" : "#374151", textDecoration: item.done ? "line-through" : "none" } }, item.text));
            itemRow.appendChild(btn({ style: { background: "none", border: "none", cursor: "pointer", color: "#d1d5db", fontSize: "12px", padding: "0 2px" }, onclick: () => {
              if (!campaignNextSteps[c.id]) campaignNextSteps[c.id] = { note: "", items: [] };
              campaignNextSteps[c.id].items = campaignNextSteps[c.id].items.filter(it => it.id !== item.id);
              renderContent();
            } }, "✕"));
            itemList.appendChild(itemRow);
          });
          nsBody.appendChild(itemList);
        }
        const addRow = div({ style: { display: "flex", gap: "6px" } });
        const addInput = h('input', { type: "text", placeholder: "Add action item…", style: { flex: "1", padding: "7px 10px", borderRadius: "6px", border: "1px solid #e5e7eb", fontFamily: "'DM Sans', sans-serif", fontSize: "12px", color: "#374151", outline: "none" } });
        if (newNextStepText[c.id]) addInput.value = newNextStepText[c.id];
        addInput.addEventListener('input', e => { newNextStepText[c.id] = e.target.value; });
        addInput.addEventListener('keydown', e => { if (e.key === 'Enter') addNextStepFn(c.id); });
        addRow.appendChild(addInput);
        addRow.appendChild(btn({ style: { background: "#F5761A", color: "white", border: "none", borderRadius: "6px", padding: "7px 12px", cursor: "pointer", fontSize: "12px", fontWeight: "600" }, onclick: () => addNextStepFn(c.id) }, "+"));
        nsBody.appendChild(addRow);
        nsWrap.appendChild(nsBody);
      }
      row.appendChild(nsWrap);
      } // end if (isOpen)
      campRows.appendChild(row);
    });
    card.appendChild(campRows);
    list.appendChild(card);
  });
  wrap.appendChild(list);
  return wrap;
}

function addNextStepFn(campaignId) {
  const text = (newNextStepText[campaignId] || "").trim();
  if (!text) return;
  if (!campaignNextSteps[campaignId]) campaignNextSteps[campaignId] = { note: "", items: [] };
  campaignNextSteps[campaignId].items.push({ id: Date.now(), text, done: false });
  newNextStepText[campaignId] = "";
  renderContent();
}

// ═══════════════ LIVE SHEET SYNC (read-only, n8n → Google Sheet → here) ═══════════════
// Each client gets its OWN tab in the Sheet + its own Publish-to-web CSV link.
// 1. In the Sheet, create one tab per client (e.g. "Quantoom", "WeKount") — n8n writes campaign
//    rows into the matching tab. The "client" column in that tab holds the segment/ICP name,
//    NOT the client name — the client is identified by which tab/URL it came from.
// 2. File → Share → Publish to web → select that specific tab → format CSV → Publish → copy URL.
// 3. Paste each URL below, keyed by the exact client name you want shown on the POS.
const CLIENT_SHEET_URLS = {
  "Quantoom": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQxb7Xps9r5GUQ0kQcCI8IzzlhyPiSopBAZqVJeMLV-hvSJzSlt0pL3ITQP69lq5jMtLUILDwX3hth0/pub?gid=0&single=true&output=csv",
  // "WeKount": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQxb7Xps9r5GUQ0kQcCI8IzzlhyPiSopBAZqVJeMLV-hvSJzSlt0pL3ITQP69lq5jMtLUILDwX3hth0/pub?gid=1800821680&single=true&output=csv",
};

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQuotes = false; }
      else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else field += c;
    }
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(c => c.trim() !== ''));
}

async function syncOneClientSheet(account, url) {
  if (!url || url.includes('PASTE_')) return; // not configured yet, skip quietly
  const res = await fetch(url + (url.includes('?') ? '&' : '?') + '_=' + Date.now());
  if (!res.ok) throw new Error(`Sheet fetch failed for ${account}: ${res.status}`);
  const text = await res.text();
  const rows = parseCSV(text);
  if (rows.length < 2) return;

  const headers = rows[0].map(h => h.trim().toLowerCase());
  const liveRows = rows.slice(1);

  liveRows.forEach(r => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (r[i] || '').trim(); });
    if (!obj.client) return; // this is the segment/ICP name, e.g. "1 - Animal Health Pharma"

    const id = 'live-' + account + '::' + obj.client;
    const existing = campaigns.find(c => c.id === id);
    if (existing) {
      if (obj.status) existing.status = obj.status;
      if (obj.stage) existing.stage = obj.stage;
      if (obj.bounce !== '') existing.bounce = obj.bounce;
      if (obj.openrate !== '') existing.openRate = obj.openrate;
      if (obj.replyrate !== '') existing.replyRate = obj.replyrate;
      if (obj.startdate) existing.startDate = obj.startdate;
      if (obj.enddate) existing.endDate = obj.enddate;
      existing._liveSync = true;
    } else {
      campaigns.push({
        id, client: obj.client, account: account,
        status: obj.status || 'active', stage: obj.stage || 'campaign',
        assignee: obj.assignee || '', startDate: obj.startdate || '', endDate: obj.enddate || '',
        bounce: obj.bounce || '', openRate: obj.openrate || '', replyRate: obj.replyrate || '',
        notes: obj.notes || '', emailsSent: 0, totalLeads: 0, leadsContacted: 0, booked: 0, interested: 0,
        _liveSync: true
      });
    }
  });
}

async function syncCampaignsFromSheet() {
  for (const [account, url] of Object.entries(CLIENT_SHEET_URLS)) {
    try {
      await syncOneClientSheet(account, url);
    } catch (e) {
      console.error(`Sheet sync error (${account}):`, e);
    }
  }
  renderContent();
}

// Init
render();
syncCampaignsFromSheet();
setInterval(syncCampaignsFromSheet, 5 * 60 * 1000); // refresh every 5 min
</script>
